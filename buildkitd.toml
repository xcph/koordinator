debug = true

# 内网 Harbor：证书无 SAN / 自签等导致 Go 报 x509 not standards compliant 时，BuildKit 需显式 insecure。
# 仅建议隔离内网使用; 根治请换带 SAN 的合规 TLS 证书。
# 若需 Harbor 自签 CA，可参考 cloudphone-operator/buildkitd.toml 增加 ca = ["certs/harbor-ca.crt"] 并在本目录放置证书。
[registry."registry.k8s.local:10443"]
  insecure = true

[dns]
  nameservers = ["10.0.0.1"]

[registry."docker.io"]
  mirrors = [
    "https://hub.mirrorify.net",
    "https://docker.1ms.run",
    "https://dockerproxy.net",
    "https://hub3.nat.tf"
  ]
